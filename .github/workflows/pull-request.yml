name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/mydb
      REDIS_URL: redis://localhost:6379
      ALLOWED_ORIGIN: http://localhost:5173
      NODE_ENV: test
      SESSION_SECRET: placeholder-secret-minimum-32-characters-long
      SESSION_SALT: test-salt-16char

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check (lint + typecheck)
        run: npm run check

      - name: Test
        run: npm test
